<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Loading...</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;display:flex;justify-content:center;align-items:center;height:100vh;font-family:'Courier New',monospace;color:#0f0;flex-direction:column}
.box{background:#111;padding:40px;border:2px solid #0f0;border-radius:12px;text-align:center;max-width:400px;width:90%}
.loader{width:100%;height:4px;background:#222;margin:20px 0;border-radius:4px;overflow:hidden}
.loader span{display:block;height:100%;width:0%;background:#0f0;animation:load 4s ease-in-out forwards}
@keyframes load{0%{width:0%}70%{width:70%}100%{width:100%}}
.btn{background:#0f0;color:#000;border:none;padding:12px 28px;font-size:1rem;font-weight:bold;border-radius:8px;cursor:pointer;margin-top:20px;transition:0.3s}
.btn:hover{background:#0c0;transform:scale(1.02)}
#result{display:none;margin-top:20px;padding:16px;background:#1a1a1a;border-radius:8px;word-break:break-all;font-size:0.85rem;color:#0f0}
</style>
</head>
<body>
<div class="box">
<h2>⏳ Verifying Access...</h2>
<div class="loader"><span></span></div>
<p id="status" style="color:#888;font-size:0.8rem;">Mengaktifkan protokol...</p>
<button class="btn" id="revealBtn" style="display:none;">✔️ Lanjutkan</button>
<div id="result">
<p style="color:#ff0;">⚠️ Link Prank Aktif</p>
<p>Kirim link ini ke target:</p>
<code id="prankLink" style="background:#222;padding:8px;display:block;border-radius:4px;margin:10px 0;color:#0f0;"></code>
</div>
</div>
<script>
(function(){
const config={fakeProgress:true,jumpScare:true,fakeVirus:true,redirectAfter:false,redirectUrl:'https://youtu.be/dQw4w9WgXcQ'};
let progress=0;const statusEl=document.getElementById('status');const loaderSpan=document.querySelector('.loader span');const revealBtn=document.getElementById('revealBtn');const resultDiv=document.getElementById('result');const prankLinkEl=document.getElementById('prankLink');
const messages=['Memeriksa koneksi aman...','Mengenkripsi channel...','Memuat payload...','Hampir selesai...'];
function updateStatus(msg){if(statusEl)statusEl.textContent=msg;}
const baseUrl=window.location.href.split('?')[0];const fakeId='PRK-'+Math.random().toString(36).substring(2,8).toUpperCase();const prankLink=baseUrl+'?id='+fakeId+'&mode=prank';if(prankLinkEl)prankLinkEl.textContent=prankLink;
const interval=setInterval(()=>{if(progress>=100){clearInterval(interval);if(loaderSpan)loaderSpan.style.width='100%';updateStatus('✅ Siap!');if(revealBtn)revealBtn.style.display='inline-block';return;}
const increment=Math.floor(Math.random()*6)+2;progress=Math.min(progress+increment,100);if(loaderSpan)loaderSpan.style.width=progress+'%';const idx=Math.min(Math.floor(progress/25),messages.length-1);updateStatus(messages[idx]);},300);
if(revealBtn){revealBtn.addEventListener('click',function(){if(resultDiv)resultDiv.style.display='block';this.style.display='none';if(config.jumpScare){const flash=document.createElement('div');flash.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:white;z-index:9999;animation:flashAnim 0.3s forwards;';flash.style.animation='flashAnim 0.3s forwards';const style=document.createElement('style');style.textContent='@keyframes flashAnim{0%{opacity:1}100%{opacity:0;display:none}}';document.head.appendChild(style);document.body.appendChild(flash);try{const audioCtx=new(window.AudioContext||window.webkitAudioContext)();const oscillator=audioCtx.createOscillator();const gain=audioCtx.createGain();oscillator.connect(gain);gain.connect(audioCtx.destination);oscillator.frequency.value=800;oscillator.type='sawtooth';gain.gain.setValueAtTime(0.3,audioCtx.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.5);oscillator.start(audioCtx.currentTime);oscillator.stop(audioCtx.currentTime+0.5);}catch(e){}}
if(config.fakeVirus){setTimeout(()=>{alert('⚠️ VIRUS DETEKSI! Sistem Anda terinfeksi! (Prank)');},600);}
if(config.redirectAfter&&config.redirectUrl){setTimeout(()=>{window.location.href=config.redirectUrl;},2000);}});}
const params=new URLSearchParams(window.location.search);
if(params.get('mode')==='prank'){if(revealBtn)revealBtn.style.display='none';if(loaderSpan)loaderSpan.style.width='100%';updateStatus('✅ Prank Active!');if(resultDiv)resultDiv.style.display='block';setTimeout(()=>{if(config.jumpScare){const flash=document.createElement('div');flash.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:white;z-index:9999;animation:flashAnim 0.3s forwards;';flash.style.animation='flashAnim 0.3s forwards';const style=document.createElement('style');style.textContent='@keyframes flashAnim{0%{opacity:1}100%{opacity:0;display:none}}';document.head.appendChild(style);document.body.appendChild(flash);}
if(config.fakeVirus){alert('⚠️ VIRUS DETEKSI! Sistem Anda terinfeksi! (Prank)');}
if(config.redirectAfter&&config.redirectUrl){setTimeout(()=>{window.location.href=config.redirectUrl;},1500);}},800);}
})();
</script>
</body>
</html>
